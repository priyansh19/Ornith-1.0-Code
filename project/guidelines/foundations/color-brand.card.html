<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Orange" subtitle="Primary CTA + brand voltage (from the M2 mark)" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../../styles.css"/>
<style>
  body{padding:18px;display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--radius-md);border:1px solid var(--border);padding:12px;height:104px;display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
  .n{font-family:var(--font-sans);font-size:12px;font-weight:600;color:var(--text)}
  .h{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
  .on{color:var(--on-brand)} .onw{color:#fff}
</style></head><body>
  <div class="sw" style="background:var(--brand)"><span class="n on">brand</span><span class="h on">#e06c3a</span></div>
  <div class="sw" style="background:var(--brand-hover)"><span class="n on">brand-hover</span><span class="h on">#ee7c49</span></div>
  <div class="sw" style="background:var(--brand-active)"><span class="n onw">brand-active</span><span class="h onw">#c25a2c</span></div>
  <div class="sw" style="background:var(--brand-soft)"><span class="n">brand-soft</span><span class="h">#2a1a12</span></div>
</body></html>
