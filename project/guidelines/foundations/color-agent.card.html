<!-- @dsCard group="Colors" viewport="700x150" name="Agent — Violet" subtitle="Harness mode + agent identity accent" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../../styles.css"/>
<style>
  body{padding:18px;display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--radius-md);border:1px solid var(--border);padding:12px;height:104px;display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
  .n{font-family:var(--font-sans);font-size:12px;font-weight:600;color:#fff}
  .h{font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.7)}
  .dk .n{color:var(--agent-hover)} .dk .h{color:var(--muted)}
</style></head><body>
  <div class="sw" style="background:var(--agent)"><span class="n">agent</span><span class="h">#7c6af7</span></div>
  <div class="sw" style="background:var(--agent-hover)"><span class="n">agent-hover</span><span class="h">#8f80f9</span></div>
  <div class="sw" style="background:var(--agent-active)"><span class="n">agent-active</span><span class="h">#6553e0</span></div>
  <div class="sw dk" style="background:var(--agent-soft)"><span class="n">agent-soft</span><span class="h">#1a1740</span></div>
</body></html>
