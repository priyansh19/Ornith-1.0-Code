<!DOCTYPE html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../../styles.css"/>
<style>
  body{padding:20px;display:flex;align-items:flex-end;gap:16px}
  .c{display:flex;flex-direction:column;align-items:center;gap:7px}
  .b{background:var(--brand);border-radius:2px;width:100%}
  .box{display:flex;align-items:flex-end;height:64px}
  .t{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);white-space:nowrap}
</style></head><body>
  <div class="c"><div class="box"><div class="b" style="width:4px;height:4px"></div></div><span class="t">1·4</span></div>
  <div class="c"><div class="box"><div class="b" style="width:8px;height:8px"></div></div><span class="t">2·8</span></div>
  <div class="c"><div class="box"><div class="b" style="width:12px;height:12px"></div></div><span class="t">3·12</span></div>
  <div class="c"><div class="box"><div class="b" style="width:16px;height:16px"></div></div><span class="t">4·16</span></div>
  <div class="c"><div class="box"><div class="b" style="width:24px;height:24px"></div></div><span class="t">6·24</span></div>
  <div class="c"><div class="box"><div class="b" style="width:32px;height:32px"></div></div><span class="t">8·32</span></div>
  <div class="c"><div class="box"><div class="b" style="width:48px;height:48px"></div></div><span class="t">12·48</span></div>
  <div class="c"><div class="box"><div class="b" style="width:64px;height:64px"></div></div><span class="t">16·64</span></div>
</body></html>
