<!-- @dsCard group="Spacing" viewport="700x150" name="Radius & elevation" subtitle="Corner radii + floating-layer shadows" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/><link rel="stylesheet" href="../../styles.css"/>
<style>
  body{padding:20px;display:flex;gap:22px;align-items:center}
  .grp{display:flex;gap:14px;align-items:flex-end}
  .c{display:flex;flex-direction:column;align-items:center;gap:8px}
  .sq{width:54px;height:54px;background:var(--surface-2);border:1px solid var(--border-strong)}
  .t{font-family:var(--font-mono);font-size:10px;color:var(--muted)}
  .div{width:1px;height:72px;background:var(--border)}
  .sh{width:54px;height:54px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md)}
</style></head><body>
  <div class="grp">
    <div class="c"><div class="sq" style="border-radius:var(--radius-xs)"></div><span class="t">xs·3</span></div>
    <div class="c"><div class="sq" style="border-radius:var(--radius-sm)"></div><span class="t">sm·5</span></div>
    <div class="c"><div class="sq" style="border-radius:var(--radius-md)"></div><span class="t">md·8</span></div>
    <div class="c"><div class="sq" style="border-radius:var(--radius-lg)"></div><span class="t">lg·12</span></div>
    <div class="c"><div class="sq" style="border-radius:var(--radius-xl)"></div><span class="t">xl·16</span></div>
    <div class="c"><div class="sq" style="border-radius:var(--radius-pill)"></div><span class="t">pill</span></div>
  </div>
  <div class="div"></div>
  <div class="grp">
    <div class="c"><div class="sh" style="box-shadow:var(--shadow-sm)"></div><span class="t">shadow-sm</span></div>
    <div class="c"><div class="sh" style="box-shadow:var(--shadow-md)"></div><span class="t">shadow-md</span></div>
    <div class="c"><div class="sh" style="box-shadow:var(--shadow-pop)"></div><span class="t">shadow-pop</span></div>
  </div>
</body></html>
