<!-- @startingPoint section="LMChat" subtitle="Full chat app — Direct/Harness modes + agent trace" viewport="1200x760" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LMChat</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { height: 100%; overflow: hidden; }
  #root, .lm-app { height: 100vh; display: flex; flex-direction: column; }

  /* ── Top bar ── */
  .lm-topbar {
    display: flex; align-items: center; gap: 16px;
    height: 52px; padding: 0 16px; flex-shrink: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .lm-topbar__brand { display: flex; align-items: center; gap: 9px; }
  .lm-mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: var(--radius-sm);
    background: var(--brand); color: var(--on-brand);
    font-family: var(--font-display); font-weight: 700; font-size: 12px; letter-spacing: -.03em;
  }
  .lm-wordmark { font-family: var(--font-display); font-weight: 600; font-size: 16px; letter-spacing: -.01em; color: var(--text-heading); }
  .lm-topbar__right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

  /* harness + model pickers */
  .lm-picker { display: flex; align-items: center; gap: 8px; }
  .lm-picker__label {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); white-space: nowrap;
  }
  .lm-picker__label i { color: var(--agent-hover); }
  .lm-picker__select { min-width: 150px; }
  .lm-picker__select--harness { min-width: 168px; }

  /* server status pill */
  .lm-server {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono); font-size: 11px; color: var(--muted);
    background: var(--bg-inset); border: 1px solid var(--border); border-radius: var(--radius-pill);
    padding: 4px 10px 4px 8px; cursor: default;
  }
  .lm-server__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex-shrink: 0; }
  .lm-server--up { color: var(--text-soft); }
  .lm-server--up .lm-server__dot { background: var(--green); box-shadow: 0 0 7px var(--green); }
  .lm-trigger__count {
    margin-left: 6px; background: var(--red); color: #2a0d0d; font-family: var(--font-mono);
    font-size: 10px; font-weight: 700; border-radius: var(--radius-pill); padding: 0 6px; line-height: 16px;
  }
  .lm-project {
    display: inline-flex; align-items: center; gap: 6px; cursor: default;
    font-family: var(--font-mono); font-size: 12px; color: var(--text-soft);
    background: var(--bg-inset); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 4px 9px;
  }
  .lm-project i { color: var(--brand); }
  .lm-picker__empty {
    font-family: var(--font-mono); font-size: 12px; color: var(--faint);
    border: 1px dashed var(--border-strong); border-radius: var(--radius-md);
    padding: 6px 12px; height: var(--control-md); display: flex; align-items: center;
  }

  /* ── Body ── */
  .lm-body { flex: 1; display: flex; overflow: hidden; position: relative; }

  /* ── Sidebar ── */
  .lm-sidebar {
    width: 248px; flex-shrink: 0; display: flex; flex-direction: column;
    background: var(--surface); border-right: 1px solid var(--border); overflow: hidden;
  }
  .lm-sidebar__top { display: flex; gap: 8px; padding: 12px; border-bottom: 1px solid var(--border); }
  .lm-sidebar__top > :first-child { flex: 1; }
  .lm-sidebar__list { flex: 1; overflow-y: auto; padding: 8px 8px 12px; }
  .lm-sesgroup { margin-top: 8px; }
  .lm-folder { margin-top: 2px; }
  .lm-folder__head {
    display: flex; align-items: center; gap: 7px; width: 100%; text-align: left;
    background: transparent; border: none; cursor: pointer; padding: 7px 8px;
    font-family: var(--font-sans); font-size: 12.5px; font-weight: 500; color: var(--text-soft);
    border-radius: var(--radius-sm); transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);
  }
  .lm-folder__head:hover { background: var(--surface-2); color: var(--text); }
  .lm-folder__head i { color: var(--muted); flex-shrink: 0; }
  .lm-folder__chev { display: inline-flex; color: var(--faint); transition: transform var(--dur-fast) var(--ease-out); flex-shrink: 0; }
  .lm-folder__chev--open { transform: rotate(90deg); }
  .lm-folder__name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lm-folder__count { font-family: var(--font-mono); font-size: 10.5px; color: var(--faint); background: var(--surface-3); border-radius: var(--radius-pill); padding: 1px 7px; }
  .lm-folder__items { padding-left: 14px; margin: 2px 0 4px; border-left: 1px solid var(--border); margin-left: 13px; }
  .lm-folder__empty { font-family: var(--font-mono); font-size: 11px; color: var(--faint); padding: 6px 9px; }
  .lm-sesgroup__label {
    font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .12em;
    color: var(--faint); padding: 8px 8px 6px;
  }
  .lm-ses {
    display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
    background: transparent; border: 1px solid transparent; border-radius: var(--radius-md);
    padding: 8px 9px; cursor: pointer; color: var(--text-soft);
    transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);
  }
  .lm-ses:hover { background: var(--surface-2); color: var(--text); }
  .lm-ses--active { background: var(--surface-3); color: var(--text); border-color: var(--border-strong); }
  .lm-ses__dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .lm-ses__title { flex: 1; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lm-ses__when { font-family: var(--font-mono); font-size: 10.5px; color: var(--faint); flex-shrink: 0; }
  .lm-sidebar__foot {
    display: flex; align-items: center; gap: 9px; padding: 10px 12px; border-top: 1px solid var(--border);
  }
  .lm-sidebar__user { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .lm-sidebar__name { font-size: 13px; color: var(--text); font-weight: 500; }
  .lm-sidebar__host { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); }

  .lm-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .lm-chat { flex: 1; overflow-y: auto; padding: 22px; }
  .lm-chat__list { display: flex; flex-direction: column; gap: 14px; max-width: 760px; margin: 0 auto; }

  /* empty state */
  .lm-empty { max-width: 540px; margin: 8vh auto 0; text-align: center; }
  .lm-empty__mark {
    display: inline-flex; align-items: center; justify-content: center;
    width: 52px; height: 52px; border-radius: var(--radius-lg);
    background: var(--brand-soft); color: var(--brand); border: 1px solid color-mix(in srgb, var(--brand) 40%, transparent);
    font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: -.03em; margin-bottom: 18px;
  }
  .lm-empty__h { font-family: var(--font-display); font-size: 26px; font-weight: 500; letter-spacing: -.02em; color: var(--text-heading); margin-bottom: 9px; }
  .lm-empty__p { font-size: 14px; line-height: 1.55; color: var(--text-soft); margin-bottom: 18px; }
  .lm-empty__p b { color: var(--text); font-weight: 600; }
  .lm-empty__file { font-family: var(--font-mono); font-size: 12px; color: var(--agent-hover); background: var(--agent-soft); border-radius: var(--radius-xs); padding: 1px 6px; }
  .lm-empty__chips { display: flex; flex-direction: column; gap: 8px; align-items: stretch; }
  .lm-suggest {
    display: flex; align-items: center; gap: 9px; text-align: left;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    color: var(--text-soft); font-family: var(--font-sans); font-size: 13px; padding: 10px 13px;
    cursor: pointer; transition: border-color var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out);
  }
  .lm-suggest:hover { border-color: var(--brand); color: var(--text); background: var(--surface-2); }
  .lm-suggest i { color: var(--brand); flex-shrink: 0; }

  /* ── Composer ── */
  .lm-composer { flex-shrink: 0; padding: 12px 22px 16px; border-top: 1px solid var(--border); background: var(--surface); }
  .lm-composer__shell {
    display: flex; align-items: flex-end; gap: 8px; max-width: 760px; margin: 0 auto;
    background: var(--bg-inset); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 7px 7px 7px 9px;
    transition: border-color var(--dur-fast) var(--ease-out);
  }
  .lm-composer__shell:focus-within { border-color: var(--border-strong); }
  .lm-composer__input {
    flex: 1; background: transparent; border: none; outline: none; resize: none;
    color: var(--text); font-family: var(--font-sans); font-size: 14px; line-height: 1.5;
    padding: 7px 2px; max-height: 140px; min-height: 22px;
  }
  .lm-composer__input::placeholder { color: var(--faint); }
  .lm-composer__send { flex-shrink: 0; }
  .lm-composer__hint {
    display: flex; justify-content: space-between; max-width: 760px; margin: 8px auto 0;
    font-family: var(--font-mono); font-size: 11px; color: var(--muted);
  }
  .lm-kbd { color: var(--faint); }
  .lm-arrow { color: var(--agent-hover); }

  /* ── Right sidebar (Inspector · Thinking · Critiques) ── */
  .lm-right {
    width: 350px; flex-shrink: 0; display: flex; flex-direction: column;
    border-left: 1px solid var(--border); background: var(--bg); overflow: hidden;
    transition: width var(--dur-slow) var(--ease-out), opacity var(--dur-base) var(--ease-out);
  }
  .lm-right:not(.lm-right--open) { width: 0; opacity: 0; border-left: none; }
  .lm-right__head { display: flex; align-items: center; padding: 11px 10px 11px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .lm-right__title { display: flex; align-items: center; gap: 8px; flex: 1; font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--text-heading); white-space: nowrap; }
  .lm-right__title i { color: var(--agent-hover); }
  .lm-right__tabs { padding: 0 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .lm-right__body { flex: 1; overflow-y: auto; padding: 14px 14px 20px; }
  .lm-right__empty { font-size: 13px; padding: 8px 2px; }
  .lm-insp { display: flex; flex-direction: column; }
  .lm-dim { color: var(--muted); font-size: 13px; }
  .lm-agentlist { display: flex; flex-direction: column; gap: 9px; }
  .lm-agentlist__row { display: flex; align-items: center; gap: 10px; }
  .lm-agentlist__name { font-family: var(--font-mono); font-size: 12px; color: var(--text-soft); }
  .lm-trace { display: flex; flex-direction: column; }
  .lm-critlist { display: flex; flex-direction: column; gap: 10px; }
  .lm-critlist__head { display: flex; align-items: center; gap: 7px; padding-bottom: 4px; }

  /* ── New-session preflight (harness + directory) ── */
  .lm-pick { flex: 1; overflow-y: auto; padding: 40px 28px; max-width: 760px; margin: 0 auto; width: 100%; }
  .lm-pick__head { text-align: center; margin-bottom: 26px; }
  .lm-pick__head .lm-empty__mark { margin-bottom: 16px; }
  .lm-pick__h { font-family: var(--font-display); font-size: 26px; font-weight: 500; letter-spacing: -.02em; color: var(--text-heading); margin-bottom: 9px; }
  .lm-pick__p { font-size: 14px; line-height: 1.55; color: var(--text-soft); max-width: 520px; margin: 0 auto; }
  .lm-pick__dir { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 24px; }
  .lm-pick__dirlabel { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 9px; }
  .lm-pick__dirlabel i { color: var(--brand); }
  .lm-pick__dirrow { display: flex; gap: 9px; }
  .lm-pick__dirrow > :first-child { flex: 1; }
  .lm-pick__sub { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 12px; }
  .lm-pick__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .lm-hcard {
    text-align: left; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 15px; cursor: pointer; display: flex; flex-direction: column; gap: 7px;
    transition: border-color var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out);
  }
  .lm-hcard:hover:not(:disabled) { border-color: var(--brand); background: var(--surface-2); }
  .lm-hcard:active:not(:disabled) { transform: translateY(0.5px); }
  .lm-hcard:disabled { opacity: 0.45; cursor: not-allowed; }
  .lm-hcard__top { display: flex; align-items: center; gap: 8px; }
  .lm-hcard__dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .lm-hcard__name { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-heading); flex: 1; }
  .lm-hcard__desc { font-size: 12.5px; line-height: 1.45; color: var(--text-soft); }
  .lm-hcard__foot { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); }
  .lm-hcard__file { color: var(--agent-hover); }
  .lm-hcard__agents { display: inline-flex; align-items: center; gap: 4px; }
  .lm-hcard--more { align-items: flex-start; justify-content: center; color: var(--muted); border-style: dashed; }
  .lm-hcard--more:hover { color: var(--text); }
  .lm-hcard--more i { color: var(--agent-hover); }

  /* ── Modals (harnesses panel · settings) ── */
  .lm-modal { position: fixed; inset: 0; z-index: 60; background: var(--scrim); display: flex; align-items: center; justify-content: center; padding: 24px; }
  .lm-modal__card { width: 540px; max-width: 100%; max-height: 86vh; display: flex; flex-direction: column; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); overflow: hidden; }
  .lm-modal__head { display: flex; align-items: center; gap: 10px; padding: 15px 16px; border-bottom: 1px solid var(--border); }
  .lm-modal__title { display: flex; align-items: center; gap: 9px; font-family: var(--font-display); font-weight: 600; font-size: 16px; color: var(--text-heading); flex: 1; }
  .lm-modal__title i { color: var(--agent-hover); }
  .lm-modal__x { margin-left: 4px; }
  .lm-modal__sub { padding: 12px 16px 0; font-size: 13px; line-height: 1.5; color: var(--text-soft); }
  .lm-modal__body { padding: 14px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
  .lm-modal__foot { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-top: 1px solid var(--border); }
  .lm-hrow { display: flex; align-items: center; gap: 11px; padding: 11px 12px; border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--bg-inset); }
  .lm-hrow--loaded { border-color: color-mix(in srgb, var(--green) 28%, transparent); }
  .lm-hrow__dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .lm-hrow__main { flex: 1; min-width: 0; }
  .lm-hrow__name { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--text-heading); }
  .lm-hrow__meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
  .lm-hrow__file { color: var(--agent-hover); }
  .lm-hrow__avail { font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--faint); }
  .lm-provider { border: 1px solid var(--border); border-radius: var(--radius-md); padding: 15px; background: var(--bg-inset); }
  .lm-provider__row { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
  .lm-provider__name { display: inline-flex; align-items: center; gap: 7px; flex: 1; font-family: var(--font-display); font-size: 14px; font-weight: 600; color: var(--text-heading); }
  .lm-provider__name i { color: var(--agent-hover); }
  .lm-provider__label, .lm-provider__mlabel { display: block; font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 8px; }
  .lm-provider__url { display: flex; gap: 9px; }
  .lm-provider__url > :first-child { flex: 1; }
  .lm-provider__models { margin-top: 16px; }
  .lm-provider__tags { display: flex; flex-wrap: wrap; gap: 7px; }

  @media (max-width: 1180px) { .lm-right { width: 312px; } }
  @media (max-width: 1080px) { .lm-sidebar { display: none; } }
  @media (max-width: 940px) { .lm-right { position: absolute; right: 0; top: 0; bottom: 0; z-index: 30; box-shadow: var(--shadow-lg); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="parts.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="rightpanel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel">
  const App = window.LMKit.App;
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
</script>
</body>
</html>
