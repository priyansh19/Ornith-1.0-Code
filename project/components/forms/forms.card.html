<!-- @dsCard group="Components" viewport="700x320" name="Buttons & Inputs" subtitle="Actions, fields, toggles, selects" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 22px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 16px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 28px; max-width: 640px; }
  .lbl { font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 9px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Input, Select, Switch, SegmentedToggle } = window.LMChatDesignSystem_bc9736;
const I = (n, s=16) => <i data-lucide={n} style={{width:s,height:s}}></i>;

function Demo() {
  const [mode, setMode] = React.useState('trace');
  const [on, setOn] = React.useState(true);
  return (
    <div>
      <div className="lbl">Buttons</div>
      <div className="row">
        <Button variant="primary">Send</Button>
        <Button variant="agent" iconLeft={I('git-branch')}>Run harness</Button>
        <Button variant="secondary">Cancel</Button>
        <Button variant="ghost">Skip</Button>
        <Button variant="danger" iconLeft={I('trash-2',14)}>Clear</Button>
        <Button variant="primary" disabled>Disabled</Button>
        <Button variant="secondary" loading>Loading</Button>
      </div>
      <div className="grid2">
        <div>
          <div className="lbl">Icon buttons</div>
          <div className="row" style={{marginBottom:0}}>
            <IconButton variant="plain" aria-label="a">{I('plus')}</IconButton>
            <IconButton variant="outlined" aria-label="b">{I('settings')}</IconButton>
            <IconButton variant="solid" aria-label="c">{I('arrow-up')}</IconButton>
            <IconButton variant="danger" aria-label="d">{I('x')}</IconButton>
          </div>
        </div>
        <div>
          <div className="lbl">Segmented toggle</div>
          <SegmentedToggle accent="agent" value={mode} onChange={setMode}
            options={[{value:'chat',label:'Chat',icon:I('message-square',14)},{value:'trace',label:'Trace',icon:I('list-tree',14)}]} />
        </div>
        <div>
          <div className="lbl">Input</div>
          <Input prefix={I('search',15)} placeholder="Search models…" />
        </div>
        <div>
          <div className="lbl">Select + switch</div>
          <div className="row" style={{marginBottom:0}}>
            <div style={{flex:1}}><Select mono options={['ornith:9b','gemma4:latest']} /></div>
            <Switch checked={on} onChange={setOn} accent="agent" />
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
</script>
</body>
</html>
