<!-- @dsCard group="Components" viewport="700x400" name="Chat, Thinking & Critiques" subtitle="Bubbles, tool-call rows, ReAct trace, critiques" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 22px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; }
  .chat { display: flex; flex-direction: column; gap: 12px; }
  .lbl { font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-bottom: 11px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { MessageBubble, ThinkingStep, CritiqueCard, ToolCall } = window.LMChatDesignSystem_bc9736;

function Demo() {
  return (
    <div className="grid2">
      <div>
        <div className="lbl">Chat + ReAct trace</div>
        <div className="chat">
          <MessageBubble role="user" time="14:02">Fix the login race condition.</MessageBubble>
          <MessageBubble role="assistant" time="14:02">Found it — the token refresh wasn't mutex-guarded. Patched and tests pass.</MessageBubble>
          <ToolCall summary={<span><b>Edited</b> session.py, read 2 files, ran a tool</span>} items={[
            {kind:'read',text:'src/auth/session.py'},
            {kind:'edit',text:'src/auth/session.py',diff:[12,3]},
            {kind:'run',text:'pytest tests/auth -q'},
          ]} />
        </div>
        <div style={{height:14}} />
        <div className="stack">
          <ThinkingStep kind="thought" agent="Harness" content="Haven't seen the auth code. Read session.py before editing." />
          <ThinkingStep kind="tool" agent="Harness" content="read_file({ path: 'src/auth/session.py' })" />
          <ThinkingStep kind="observation" content="Token refresh isn't mutex-guarded — two requests can race." last />
        </div>
      </div>
      <div>
        <div className="lbl">Critique items</div>
        <div className="stack">
          <CritiqueCard severity="blocker" category="fact" id="c-017" round={1}
            message="Recommendation cites a source that no longer exists." />
          <CritiqueCard severity="major" category="gap" id="c-042" round={1}
            message="No dark-mode UI references in the design scout report."
            suggestedAction="spawn_scout({ mission: 'dark mode patterns', sources: ['mobbin'] })" />
          <CritiqueCard severity="minor" category="efficiency" id="c-051" round={2}
            message="Two findings overlap — merge before synthesis." resolved />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
