<!-- @dsCard group="Components" viewport="700x220" name="Tabs & Tooltip" subtitle="Panel view switching, hover hints" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { padding: 24px; }
  .lbl { font-family: var(--font-mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin: 0 0 11px; }
  .row { display: flex; gap: 16px; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Tabs, Tooltip, IconButton, Badge } = window.LMChatDesignSystem_bc9736;
const I = (n, s=16) => <i data-lucide={n} style={{width:s,height:s}}></i>;

function Demo() {
  const [tab, setTab] = React.useState('critiques');
  return (
    <div>
      <div className="lbl">Tabs</div>
      <div style={{maxWidth:360, marginBottom:26}}>
        <Tabs accent="agent" value={tab} onChange={setTab}
          tabs={[{value:'thinking',label:'Thinking'},{value:'critiques',label:'Critiques',count:3}]} />
      </div>
      <div className="lbl">Tooltip (hover)</div>
      <div className="row">
        <Tooltip label="Clear chat (⌘K)"><IconButton variant="outlined" aria-label="Clear">{I('trash-2')}</IconButton></Tooltip>
        <Tooltip label="Full trace → localhost:3000" side="bottom"><Badge tone="agent">trace</Badge></Tooltip>
        <Tooltip label="Attach file"><IconButton variant="outlined" aria-label="Attach">{I('paperclip')}</IconButton></Tooltip>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
</script>
</body>
</html>
